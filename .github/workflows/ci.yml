name: Data Pipeline CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pyflakes pytest pyspark==3.5.0

      - name: Lint Python files
        run: pyflakes tests/test_transformations.py || true

      - name: Run transformation tests
        run: pytest tests/test_transformations.py -v
